<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Thông tin các khóa trải nghiệm - Đoàn phường Lào Cai</title><link rel="stylesheet" href="/Sinhhoathe/main.css"><style>body{background:linear-gradient(135deg,#667eea 0,#764ba2 100%);min-height:100vh}.course-card{background:#fff;border-radius:12px;padding:2rem;margin-bottom:1.5rem;box-shadow:0 4px 20px rgba(0,0,0,.1);transition:transform .3s ease,box-shadow .3s ease}.course-card:hover{transform:translateY(-5px);box-shadow:0 8px 30px rgba(0,0,0,.15)}.course-icon{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;margin-bottom:1rem}.icon-red{background:linear-gradient(135deg,#ff6b6b 0,#ee5a52 100%)}.icon-blue{background:linear-gradient(135deg,#4facfe 0,#00f2fe 100%)}.icon-green{background:linear-gradient(135deg,#43e97b 0,#38f9d7 100%)}.icon-orange{background:linear-gradient(135deg,#fa709a 0,#fee140 100%)}.hero-section{background:#fff;border-radius:12px;padding:3rem 2rem;margin-bottom:2rem;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.1)}.search-box{margin-bottom:2rem;background:#fff;padding:2rem;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1)}.table-container{background:#fff;padding:1rem;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1)}.tag-grade{font-weight:700;text-transform:uppercase}</style><link rel="icon" type="image/webp" href="/Logo.webp"></head><body><section class="section"><div class="container" style="max-width:900px"><div id="tra-cuu-ket-qua" class="course-card" style="border-top:5px solid #43e97b;margin-top:2rem"><h2 class="title is-4 has-text-centered" style="color:#2d3436;margin-bottom:1.5rem">🔍 Tra cứu kết quả xếp loại Hè 2026</h2><div class="field"><div class="control has-icons-left"><input id="searchInput" class="input is-medium is-rounded" type="text" placeholder="Tìm kiếm theo tên học sinh hoặc phụ huynh..."> <span class="icon is-small is-left"><i class="fas fa-search"></i></span></div></div><div class="table-container mt-5"><table class="table is-fullwidth is-hoverable is-striped"><thead><tr class="has-background-light"><th>#</th><th>Họ và tên Học sinh</th><th>Phụ huynh</th><th class="has-text-centered">Xếp loại</th></tr></thead><tbody id="resultsBody"><tr><td colspan="4" class="has-text-centered has-text-grey">Đang tải dữ liệu...</td></tr></tbody></table></div></div></div></section><script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script><script src="/Sinhhoathe/firebase.config.js"></script><script>let searchInput=document.getElementById("searchInput"),resultsBody=document.getElementById("resultsBody"),ALL_DATA=[];function normalizeString(e){return e?e.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""):""}function getGradeTag(e){if(!e)return'<span class="tag is-light">Chưa cập nhật</span>';let t="is-light";return"A"===e?t="is-success":"B"===e?t="is-info":"C"===e?t="is-warning":"D"===e&&(t="is-danger"),`<span class="tag ${t} tag-grade">${e}</span>`}function renderResults(e=""){let t=normalizeString(e);var a=ALL_DATA.filter(e=>normalizeString(e.fullName).includes(t)||normalizeString(e.parentName).includes(t));0===a.length?resultsBody.innerHTML=`<tr><td colspan="4" class="has-text-centered has-text-grey">${e?"Không tìm thấy kết quả phù hợp":"Chưa có dữ liệu"}</td></tr>`:resultsBody.innerHTML=a.map((e,t)=>`
          <tr>
            <td>${t+1}</td>
            <td class="has-text-weight-semibold">${e.fullName||""}</td>
            <td>${e.parentName||""}</td>
            <td class="has-text-centered">${getGradeTag(e.grade)}</td>
          </tr>
        `).join("")}let dbRef=firebase.database().ref("Sinhhoathe/Registrations");dbRef.on("value",e=>{let t=e.val();ALL_DATA=[],t&&Object.keys(t).forEach(e=>{ALL_DATA.push(t[e])}),renderResults()}),searchInput.addEventListener("input",e=>{renderResults(e.target.value)})</script></body></html>
