<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - Quản lý Khách hàng</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <style>
        body { background: #1a1a1a; min-height: 100vh; }
        .navbar { background: #000; }
        .navbar-item, .navbar-link { color: #00d1b2 !important; font-weight: bold; }
        .card { background: #2c2c2c; color: white; border: 1px solid #444; }
        .title { color: white !important; }
        .label { color: #aaa !important; }
        .input, .select select { background: #333; color: white; border-color: #555; }
        .table { background: #2c2c2c; color: white; }
        .table th { color: #00d1b2; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <div class="navbar-item">👑 BOSS ADMIN</div>
        </div>
        <div class="navbar-end">
            <div class="navbar-item">
                <button class="button is-danger is-small" id="logoutBtn">Đăng xuất</button>
            </div>
        </div>
    </nav>

    <section class="section">
        <div class="container">
            <div class="columns">
                <!-- Form tạo tài khoản -->
                <div class="column is-4">
                    <div class="card">
                        <header class="card-header">
                            <p class="card-header-title">➕ Cấp tài khoản mới</p>
                        </header>
                        <div class="card-content">
                            <form id="createAccountForm">
                                <div class="field">
                                    <label class="label">Tên đăng nhập (Username)</label>
                                    <div class="control">
                                        <input class="input" type="text" id="newUsername" required placeholder="VD: khachhang01">
                                    </div>
                                </div>
                                <div class="field">
                                    <label class="label">Mật khẩu</label>
                                    <div class="control">
                                        <input class="input" type="text" id="newPassword" required placeholder="Mật khẩu">
                                    </div>
                                </div>
                                <div class="field">
                                    <label class="label">Gói đăng ký</label>
                                    <div class="control">
                                        <div class="select is-fullwidth">
                                            <select id="packageType">
                                                <option value="1">1 Ngày (20k)</option>
                                                <option value="7">1 Tuần (120k)</option>
                                                <option value="30">1 Tháng (360k)</option>
                                                <option value="365">1 Năm (3.960k)</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                                <div class="field">
                                    <label class="label">Ghi chú (Tên khách/SĐT)</label>
                                    <div class="control">
                                        <input class="input" type="text" id="note" placeholder="Nguyen Van A - 0912...">
                                    </div>
                                </div>
                                <div class="field">
                                    <button type="submit" class="button is-primary is-fullwidth">
                                        💰 Xác nhận cấp quyền
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Danh sách khách hàng -->
                <div class="column is-8">
                    <div class="card">
                        <header class="card-header">
                            <p class="card-header-title">📋 Danh sách khách hàng</p>
                        </header>
                        <div class="card-content">
                            <div class="table-container">
                                <table class="table is-fullwidth is-hoverable">
                                    <thead>
                                        <tr>
                                            <th>User</th>
                                            <th>Pass</th>
                                            <th>Hết hạn</th>
                                            <th>Ghi chú</th>
                                            <th>Trạng thái</th>
                                            <th>Hành động</th>
                                        </tr>
                                    </thead>
                                    <tbody id="userList">
                                        <tr><td colspan="6" class="has-text-centered">Đang tải...</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase.config.js"></script>
    
    <script>
        // Bảo mật truy cập trang này
        const SUPER_ADMIN_PASS = "tranhuyhoang"; // Pass riêng của bạn, có thể đổi
        
        if (sessionStorage.getItem('super_admin') !== 'true') {
            const pass = prompt('Nhập mật khẩu Super Admin:');
            if (pass !== SUPER_ADMIN_PASS) {
                alert('Sai mật khẩu!');
                window.location.href = 'index.html';
            } else {
                sessionStorage.setItem('super_admin', 'true');
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            sessionStorage.removeItem('super_admin');
            window.location.reload();
        });

        // Logic quản lý
        const form = document.getElementById('createAccountForm');
        const userList = document.getElementById('userList');

        // Load users from CORRECT path
        firebase.database().ref('Diemdanh/Users').on('value', (snapshot) => {
            const users = snapshot.val();
            userList.innerHTML = '';
            
            if (!users) {
                userList.innerHTML = '<tr><td colspan="6" class="has-text-centered">Chưa có khách hàng nào</td></tr>';
                return;
            }

            Object.keys(users).forEach(username => {
                const user = users[username];
                const expiryDate = new Date(user.expiryDate);
                const isExpired = Date.now() > user.expiryDate;
                const statusHtml = isExpired 
                    ? '<span class="tag is-danger">Hết hạn</span>' 
                    : '<span class="tag is-success">Hoạt động</span>';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${username}</strong></td>
                    <td>${user.password}</td>
                    <td>${expiryDate.toLocaleDateString('vi-VN')}</td>
                    <td>${user.note || '-'}</td>
                    <td>${statusHtml}</td>
                    <td>
                        <button class="button is-small is-danger" onclick="deleteUser('${username}')">
                            🗑️ Xóa
                        </button>
                    </td>
                `;
                userList.appendChild(tr);
            });
        });

        // Create User
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('newUsername').value.trim().toLowerCase(); // Username chữ thường không dấu
            const password = document.getElementById('newPassword').value.trim();
            const days = parseInt(document.getElementById('packageType').value);
            const note = document.getElementById('note').value;

            if (/[^a-z0-9]/.test(username)) {
                alert('Username chỉ được chứa chữ thường và số, không dấu, không khoảng cách!');
                return;
            }

            // Tính ngày hết hạn
            const expiryDate = new Date();
            expiryDate.setDate(expiryDate.getDate() + days);

            const userData = {
                password: password,
                expiryDate: expiryDate.getTime(),
                note: note,
                createdAt: firebase.database.ServerValue.TIMESTAMP
            };

            try {
                // Kiểm tra user tồn tại chưa
                const snapshot = await firebase.database().ref(`Diemdanh/Users/${username}`).once('value');
                if (snapshot.exists() && !confirm('User này đã tồn tại. Bạn có muốn ghi đè (gia hạn) không?')) {
                    return;
                }

                await firebase.database().ref(`Diemdanh/Users/${username}`).set(userData);
                alert(`✅ Đã cấp quyền cho [${username}] thành công!\nHết hạn: ${expiryDate.toLocaleDateString()}`);
                form.reset();
            } catch (error) {
                alert('Lỗi: ' + error.message);
            }
        });

        // Delete User
        window.deleteUser = async function(username) {
            if (!confirm(`⚠️ CẢNH BÁO!\n\nBạn sắp xóa khách hàng [${username}].\n\nBạn chắc chắn chứ?`)) {
                return;
            }

            // Yêu cầu nhập lại mật khẩu để xác nhận
            const confirmPass = prompt("🔒 Để thực hiện xóa vĩnh viễn, vui lòng nhập mật khẩu Super Admin:");
            
            if (confirmPass !== SUPER_ADMIN_PASS) {
                alert("⛔ Mật khẩu không đúng!");
                return;
            }

            try {
                await firebase.database().ref(`Diemdanh/Users/${username}`).remove();
                alert('✅ Đã xóa khách hàng!');
            } catch (error) {
                console.error(error);
                alert('Lỗi khi xóa: ' + error.message);
            }
        };
    </script>
</body>
</html>
